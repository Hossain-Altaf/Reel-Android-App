name: reels_app
description: Reels-short video app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  flutter_riverpod: ^2.5.1

  http: ^1.2.2
  shared_preferences: ^2.3.2

  video_player: ^2.9.1
  video_compress: ^3.1.3

  image_picker: ^1.1.2

  cached_network_image: ^3.3.1
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true